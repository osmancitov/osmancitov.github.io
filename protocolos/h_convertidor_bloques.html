<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Convertidor de bloques</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #181818;
      color: #D4D0C8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2.5rem 1rem;
    }

    .wrap {
      width: 100%;
      max-width: 720px;
    }

    header {
      margin-bottom: 2rem;
    }

    header h1 {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #888780;
    }

    header p {
      font-size: 11px;
      color: #555550;
      margin-top: 3px;
    }

    .card {
      background: #1E1E1E;
      border: 0.5px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 1.5rem 1.75rem 1.75rem;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 1.25rem;
    }

    label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888780;
      font-weight: 500;
      display: block;
      margin-bottom: 5px;
    }

    input, textarea {
      background: #2A2A2A;
      border: 0.5px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #D4D0C8;
      font-size: 13px;
      padding: 7px 10px;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
      font-family: inherit;
      width: 100%;
    }

    input:focus, textarea:focus {
      border-color: rgba(255,255,255,0.25);
      background: #303030;
    }

    textarea {
      font-family: 'Fira Mono', 'Cascadia Code', 'Consolas', monospace;
      font-size: 11.5px;
      line-height: 1.6;
      resize: vertical;
    }

    textarea[readonly] {
      background: #252525;
      color: #A0A098;
    }

    .field-block {
      margin-bottom: 1rem;
    }

    .btn {
      background: #333;
      color: #D4D0C8;
      border: 0.5px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.04em;
      transition: background 0.15s, border-color 0.15s;
      font-family: inherit;
    }

    .btn:hover { background: #3D3D3D; border-color: rgba(255,255,255,0.22); }

    .btn.sec {
      background: transparent;
      border: 0.5px solid rgba(255,255,255,0.1);
      color: #888780;
      padding: 6px 14px;
      font-size: 12px;
    }

    .btn.sec:hover { background: #2A2A2A; color: #D4D0C8; }

    .divider {
      height: 0.5px;
      background: rgba(255,255,255,0.07);
      margin: 1.25rem 0;
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .counter {
      font-size: 11px;
      color: #555550;
      letter-spacing: 0.04em;
    }

    #resultado-wrap { display: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Convertidor de bloques</h1>
      <p>prompt → imagen HTML</p>
    </header>

    <div class="card">
      <div class="field-grid">
        <div>
          <label for="slug">Slug</label>
          <input type="text" id="slug" placeholder="osmancito_anochecer" />
        </div>
        <div>
          <label for="inicio">Número inicial</label>
          <input type="number" id="inicio" value="1" min="1" />
        </div>
      </div>

      <div class="field-block">
        <label for="entrada">HTML de entrada</label>
        <textarea id="entrada" rows="10" placeholder="Pega aquí los bloques con &lt;h2&gt; como cabecera de sección y &lt;p&gt;&lt;strong&gt;…&lt;/strong&gt;&lt;/p&gt; como títulos de imagen"></textarea>
      </div>

      <button class="btn" onclick="convertir()">Convertir ↗</button>

      <div id="resultado-wrap">
        <div class="divider"></div>
        <div class="result-header">
          <span class="counter" id="contador-label"></span>
          <button class="btn sec" id="btn-copiar" onclick="copiar()">Copiar resultado</button>
        </div>
        <textarea id="salida" rows="14" readonly></textarea>
      </div>
    </div>
  </div>

  <script>
    function normalizar(t) {
      return t
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/[^a-z0-9]+/g, '')
        .trim();
    }

    const TIPOS = ['recepcion', 'presentacion', 'sintesis', 'hallazgos', 'transversales'];

    function tipoDesdeH2(texto) {
      const norm = normalizar(texto);
      return TIPOS.find(t => norm.includes(t)) || norm.split(/\s+/).pop();
    }

    function limpiarTitulo(t) {
      const sep = t.indexOf('\u2014');
      return sep !== -1 ? t.slice(sep + 1).trim() : t;
    }

    function extraerBloques(html) {
      const bloques = [];
      const div = document.createElement('div');
      div.innerHTML = html;
      const children = Array.from(div.childNodes);
      let tipoActual = '';
      let i = 0;
      while (i < children.length) {
        const node = children[i];
        if (node.nodeType !== 1) { i++; continue; }

        if (/^H[1-6]$/.test(node.tagName)) {
          tipoActual = tipoDesdeH2(node.textContent.trim());
          i++; continue;
        }

        if (node.tagName === 'P') {
          const strong = node.querySelector('strong');
          if (strong) {
            const titulo = limpiarTitulo(strong.textContent.trim());
            let j = i + 1;
            while (j < children.length && children[j].nodeType !== 1) j++;
            const siguiente = j < children.length ? children[j] : null;
            if (siguiente && (siguiente.tagName === 'PRE' || siguiente.tagName === 'P' || siguiente.tagName === 'HR')) {
              bloques.push({ titulo, tipo: tipoActual });
              i++; continue;
            }
          }
        }
        i++;
      }
      return bloques;
    }

    function generarBloque(titulo, n, slug, tipo) {
      const alt = titulo.replace(/"/g, '&quot;');
      const fname = `${slug}_${n}_${tipo}.jpg`;
      return `<!-- IMAGEN ${n} -->\n\t<div class="prompt-imagen">\n\t\t<div class="prompt-imagen-cabecera"><strong>${titulo}</strong></div>\n\t\t<figure class="img-container">\n\t\t\t<img src="img/${fname}"\n\t\t\t\t alt="${alt}"\n\t\t\t\t width="848"\n\t\t\t\t height="1264"\n\t\t\t\t loading="lazy">\n\t\t</figure>\n\t</div>`;
    }

    function convertir() {
      const slug = document.getElementById('slug').value.trim();
      const inicio = parseInt(document.getElementById('inicio').value, 10) || 1;
      const entrada = document.getElementById('entrada').value.trim();

      if (!slug || !entrada) {
        document.getElementById('salida').value = '⚠ Completa el slug y el bloque de entrada.';
        document.getElementById('resultado-wrap').style.display = 'block';
        return;
      }

      const bloques = extraerBloques(entrada);
      if (bloques.length === 0) {
        document.getElementById('salida').value = '⚠ No se encontraron bloques válidos.';
        document.getElementById('resultado-wrap').style.display = 'block';
        return;
      }

      const resultado = bloques.map((b, i) => generarBloque(b.titulo, inicio + i, slug, b.tipo)).join('\n\n');
      document.getElementById('salida').value = resultado;
      document.getElementById('contador-label').textContent = `${bloques.length} bloque${bloques.length !== 1 ? 's' : ''} convertido${bloques.length !== 1 ? 's' : ''}`;
      document.getElementById('resultado-wrap').style.display = 'block';
    }

    function copiar() {
      const salida = document.getElementById('salida');
      salida.select();
      document.execCommand('copy');
      const btn = document.getElementById('btn-copiar');
      const prev = btn.textContent;
      btn.textContent = 'Copiado';
      setTimeout(() => btn.textContent = prev, 1500);
    }
  </script>
</body>
</html>
